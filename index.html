<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A1A">
<title>Pin Up Clean</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --red:#D32F2F;--cream:#FFF8F0;--dark:#1A1A1A;--light:#F5EDE0;
  --green:#2E7D32;--green-l:#E8F5E9;--amber:#E65100;--amber-l:#FFF3E0;
  --blue:#1565C0;--blue-l:#E3F2FD;--border:#E0D4C4;--mid:#666;
  --ok-bg:#E8F5E9;--ok-fg:#2E7D32;--urg-bg:#FFEBEE;--urg-fg:#C62828;
  --warn-bg:#FFF8E1;--warn-fg:#E65100;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--dark)}
.login-card{background:white;border-radius:16px;padding:32px;width:100%;max-width:380px;border-top:5px solid var(--red)}
.login-logo{font-family:Georgia,serif;font-size:36px;color:var(--dark);text-align:center;margin-bottom:4px;letter-spacing:2px}
.login-sub{font-size:12px;color:#888;text-align:center;margin-bottom:28px}
.login-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.login-field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#666}
.login-field input{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:-apple-system,sans-serif;background:var(--cream)}
.login-field input:focus{outline:none;border-color:var(--dark)}
.btn-login{width:100%;padding:12px;background:var(--dark);color:white;border:none;border-radius:8px;font-family:-apple-system,sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-login:hover{background:var(--red)}
#login-error{color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none}

/* MAIN APP */
#app{display:none}
header{background:var(--dark);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100}
header h1{font-family:Georgia,serif;font-size:22px;letter-spacing:2px}
.user-info{font-size:12px;color:#aaa;text-align:right}
.user-info strong{color:white;display:block;font-size:13px}
.btn-logout{background:none;border:1px solid #444;color:#aaa;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:4px}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.stat{background:white;border:1px solid var(--border);border-radius:8px;padding:12px;border-top:3px solid var(--red)}
.stat .label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.stat .value{font-family:Georgia,serif;font-size:24px;line-height:1}
.stat .sub{font-size:10px;color:#888;margin-top:2px}

.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:white;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.tab.active{background:var(--dark);color:white;border-color:var(--dark)}
.tab:hover:not(.active){background:var(--light)}

.card{background:white;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-family:Georgia,serif;font-size:20px;letter-spacing:1px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}

.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:600px){.form-row{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#666}
.field input,.field select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:-apple-system,sans-serif;background:var(--cream)}
.field input:focus,.field select:focus{outline:none;border-color:var(--dark)}

.ptbl{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0;overflow-x:auto;display:block}
.ptbl th{background:var(--dark);color:white;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.ptbl td{padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
.ptbl tr:nth-child(even) td{background:var(--light)}
.ptbl input[type=number]{width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px}

.btn{padding:9px 20px;border-radius:6px;border:none;font-family:-apple-system,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--dark);color:white}
.btn-primary:hover{background:var(--red)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:4px;border:none;cursor:pointer;font-weight:600}
.btn-danger{background:#ffebee;color:var(--red)}
.btn-success{background:var(--ok-bg);color:var(--ok-fg)}
.btn-blue{background:var(--blue-l);color:var(--blue)}

.pedido-card{background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.pedido-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s;flex-wrap:wrap}
.pedido-header:hover{background:var(--light)}
.pedido-num{font-family:Georgia,serif;font-size:20px;color:var(--red);min-width:45px}
.pedido-info{flex:1;min-width:120px}
.pedido-info .cliente{font-weight:600;font-size:13px}
.pedido-info .fecha{font-size:11px;color:#888}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-pendiente{background:var(--warn-bg);color:var(--warn-fg)}
.badge-entregado{background:var(--ok-bg);color:var(--ok-fg)}
.badge-produccion{background:var(--blue-l);color:var(--blue)}
.badge-pagado{background:var(--ok-bg);color:var(--ok-fg)}
.badge-nopagado{background:#ffebee;color:var(--red)}
.pedido-body{border-top:1px solid var(--border);padding:14px 16px;display:none}
.pedido-body.open{display:block}
.pedido-body table{width:100%;border-collapse:collapse;font-size:12px}
.pedido-body th{padding:5px 8px;background:var(--light);font-weight:600;font-size:10px;text-transform:uppercase;color:#666}
.pedido-body td{padding:5px 8px;border-bottom:1px solid var(--border)}
.pedido-actions{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pedido-actions select{padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px}

.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl th{background:var(--dark);color:white;padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
.stbl td{padding:8px 12px;border-bottom:1px solid var(--border)}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:nth-child(even) td{background:var(--light)}
.num{text-align:right;font-weight:600}
.big-num{font-family:Georgia,serif;font-size:16px;color:var(--green)}

.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:white;border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-card h3{font-family:Georgia,serif;font-size:16px;letter-spacing:1px;margin-bottom:12px}
.chart-wrap{position:relative;height:240px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:14px;padding:24px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;border-top:4px solid var(--red)}
.modal h2{font-family:Georgia,serif;font-size:20px;letter-spacing:1px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.modal-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
.btn-secondary{background:var(--light);color:var(--dark);padding:9px 20px;border-radius:6px;border:1px solid var(--border);font-family:-apple-system,sans-serif;font-size:13px;font-weight:600;cursor:pointer}

/* ADMIN */
.admin-user-card{background:white;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.admin-user-card .info{flex:1}
.admin-user-card .nombre{font-weight:600;font-size:14px}
.admin-user-card .email{font-size:12px;color:#888}
.rol-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.rol-admin{background:#fce4ec;color:#880e4f}
.rol-comercial{background:var(--blue-l);color:var(--blue)}
.rol-produccion{background:var(--warn-bg);color:var(--warn-fg)}
.rol-compras{background:var(--ok-bg);color:var(--ok-fg)}

.empty{text-align:center;padding:32px;color:#999;font-size:13px}
.chevron{transition:transform .2s;font-size:11px;color:#999;margin-left:auto}
.chevron.open{transform:rotate(180deg)}
.loading{text-align:center;padding:32px;color:#888;font-size:13px}
</style>
</head>

async function supa(path,method='GET',body=null){
  const h={'apikey':SUPA_KEY,'Content-Type':'application/json'};
  if(supaToken)h['Authorization']='Bearer '+supaToken;
  const r=await fetch(SUPA_URL+path,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=r.headers.get('content-type');
  return t&&t.includes('json')?r.json():r.text();
}

function calcU(pid,uxb){
  const b=parseInt(document.getElementById('b-'+pid)?.value)||0;
  const unids=b*uxb;
  document.getElementById('u-'+pid).textContent=unids;
  const bon=document.getElementById('bon-'+pid)?.checked;
  const pr=parseFloat(document.getElementById('precio-'+pid)?.value)||0;
  const sub=bon?'$0 (BONIF.)':(pr>0?fmt(unids*pr):'-');
  document.getElementById('sub-'+pid).textContent=sub;
  recalcFormTotal();
}

function recalcFormTotal(){
  let total=0;
  PRODS.forEach(pp=>{
    const b=parseInt(document.getElementById('b-'+pp.id)?.value)||0;
    const bon=document.getElementById('bon-'+pp.id)?.checked;
    const pr=parseFloat(document.getElementById('precio-'+pp.id)?.value)||0;
    if(!bon&&b>0&&pr>0)total+=b*pp.uxb*pr;
  });
  const conIva=document.getElementById('f-iva')?.checked;
  document.getElementById('form-subtotal').textContent=fmt(total);
  document.getElementById('form-iva-monto').textContent=fmt(total*0.21);
  document.getElementById('form-iva-row').style.display=conIva?'block':'none';
  document.getElementById('form-total').textContent=conIva?fmt(total*1.21):fmt(total);
}

async function cambiarEstado(id,v){

  const p=pedidos.find(x=>x.id===id);if(p)p.estado=v;

async function toggleCobro(id){
  const p=pedidos.find(x=>x.id===id);if(!p)return;
  p.cobro=p.cobro==='pagado'?'nopagado':'pagado';
  await supa(`/rest/v1/pedidos?id=eq.${id}`,'PATCH',{cobro:p.cobro});

}

}

    return`<tr>
      <td>${pp.nombre}</td><td>${pp.pres}</td><td>${pp.uxb}</td>
      <td><input type="number" min="0" id="eb-${pp.id}" value="${b}" oninput="calcEU(${pp.id},${pp.uxb})"></td>
      <td id="eu-${pp.id}" style="color:#888">${b*pp.uxb}</td>
      <td><input type="number" min="0" id="eprecio-${pp.id}" value="${pr||''}" placeholder="$/bot" style="width:75px"></td>
      <td><input type="checkbox" id="ebon-${pp.id}" ${bon?'checked':''}> <label for="ebon-${pp.id}" style="font-size:10px;color:var(--amber)">Bon.</label></td>
    </tr>`;
  }).join('');
  document.getElementById('edit-modal').classList.add('open');
}

function calcEU(pid,uxb){
  const b=parseInt(document.getElementById('eb-'+pid).value)||0;
  document.getElementById('eu-'+pid).textContent=b*uxb;
}

function cerrarModal(){document.getElementById('edit-modal').classList.remove('open');editingId=null;}
document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)cerrarModal();});

async function guardarEdicion(){
  const p=pedidos.find(x=>x.id===editingId);if(!p)return;
  const prods=PRODS.map(pp=>({pid:pp.id,bultos:parseInt(document.getElementById('eb-'+pp.id).value)||0,precio:parseFloat(document.getElementById('eprecio-'+pp.id).value)||0,bonificado:document.getElementById('ebon-'+pp.id).checked})).filter(x=>x.bultos>0);
  const update={
    cliente:document.getElementById('e-cliente').value.trim(),
    fecha:document.getElementById('e-fecha').value,
    estado:document.getElementById('e-estado').value,
    cobro:document.getElementById('e-cobro').value,
    fecha_cobro:document.getElementById('e-fechacobro').value||null,
    notas:document.getElementById('e-notas').value,
    productos:prods
  };
  await supa(`/rest/v1/pedidos?id=eq.${editingId}`,'PATCH',update);
  Object.assign(p,update);
  cerrarModal();renderPedidos();updateStats();
}

function renderCobros(){
  const sorted=[...pedidos].sort((a,b)=>(a.fecha_cobro||'9999')>(b.fecha_cobro||'9999')?1:-1);
  const canEdit=['admin','comercial'].includes(currentProfile.rol);
  document.getElementById('tab-cobros').innerHTML=`<div class="card"><h2>Estado de cobros</h2>${
    sorted.map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap">
      <div style="flex:1;min-width:150px">
        <div style="font-weight:600;font-size:13px">P${p.id} — ${p.cliente}</div>
        <div style="font-size:11px;color:#888">${p.fecha}${p.fecha_cobro?' · Cobro: '+p.fecha_cobro:''}${p.notas?' · '+p.notas:''}</div>
      </div>
      <strong style="font-family:Georgia,serif;font-size:16px;color:var(--green)">${fmt(totalMonto(p))}</strong>
      <span class="badge ${p.cobro==='pagado'?'badge-pagado':'badge-nopagado'}">${p.cobro==='pagado'?'✓ Cobrado':'Pendiente'}</span>
      ${canEdit?`<button class="btn-sm ${p.cobro==='pagado'?'btn-danger':'btn-success'}" onclick="toggleCobro(${p.id})">${p.cobro==='pagado'?'Desmarcar':'Marcar cobrado'}</button>`:''}
    </div>`).join('')
  }</div>`;
}

function renderStats(){
  const map={};
  pedidos.forEach(ped=>(ped.productos||[]).forEach(pr=>{
    const pp=getProd(pr.pid);if(!pp)return;
    const k=`${pp.nombre} ${pp.pres}`;
    if(!map[k])map[k]={nombre:pp.nombre,pres:pp.pres,uxb:pp.uxb,bultos:0,unids:0,count:0};
    map[k].bultos+=pr.bultos;map[k].unids+=pr.bultos*pp.uxb;map[k].count++;
  }));
  const sorted=Object.entries(map).sort((a,b)=>b[1].bultos-a[1].bultos);
  const cliMap={};
  pedidos.forEach(p=>{if(!cliMap[p.cliente])cliMap[p.cliente]=0;cliMap[p.cliente]+=totalBultos(p);});
  const mesesMap={};
  pedidos.forEach(p=>{const m=p.fecha?p.fecha.substring(0,7):'';if(m){if(!mesesMap[m])mesesMap[m]=0;mesesMap[m]+=totalBultos(p);}});
  const mKeys=Object.keys(mesesMap).sort();

  document.getElementById('tab-estadisticas').innerHTML=`
    <div class="charts-grid">
      <div class="chart-card"><h3>Productos más vendidos</h3><div class="chart-wrap"><canvas id="chart-torta"></canvas></div></div>
      <div class="chart-card"><h3>Ventas por cliente</h3><div class="chart-wrap"><canvas id="chart-clientes"></canvas></div></div>
    </div>
    <div class="chart-card" style="margin-bottom:16px"><h3>Bultos por mes</h3><div class="chart-wrap" style="height:200px"><canvas id="chart-meses"></canvas></div></div>
    <div class="card"><h2>Totales por producto</h2>
      <table class="stbl"><thead><tr><th>Producto</th><th>Pres.</th><th>Bultos</th><th>Unidades</th><th>Pedidos</th></tr></thead>
      <tbody>${sorted.map(([k,v])=>`<tr><td>${v.nombre}</td><td>${v.pres}</td><td class="num big-num">${v.bultos}</td><td class="num">${v.unids}</td><td class="num">${v.count}</td></tr>`).join('')}</tbody>
      </table></div>`;

  if(charts.torta)charts.torta.destroy();
  charts.torta=new Chart(document.getElementById('chart-torta'),{type:'doughnut',data:{labels:sorted.slice(0,8).map(([k])=>k),datasets:[{data:sorted.slice(0,8).map(([,v])=>v.bultos),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10}}}}});
  if(charts.clientes)charts.clientes.destroy();
  charts.clientes=new Chart(document.getElementById('chart-clientes'),{type:'bar',data:{labels:Object.keys(cliMap),datasets:[{label:'Bultos',data:Object.values(cliMap),backgroundColor:COLORS,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f0e8dc'}},x:{grid:{display:false}}}}});
  if(charts.meses)charts.meses.destroy();
  charts.meses=new Chart(document.getElementById('chart-meses'),{type:'line',data:{labels:mKeys,datasets:[{label:'Bultos',data:mKeys.map(k=>mesesMap[k]),borderColor:'#D32F2F',backgroundColor:'rgba(211,47,47,.1)',fill:true,tension:.3,pointRadius:4,pointBackgroundColor:'#D32F2F'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true},x:{grid:{display:false}}}}});
}

function renderResumen(){
  const totalB=pedidos.reduce((a,p)=>a+totalBultos(p),0);
  const totalM=pedidos.reduce((a,p)=>a+totalMonto(p),0);
  const cobrados=pedidos.filter(p=>p.cobro==='pagado').length;
  const pendCobro=pedidos.filter(p=>p.cobro!=='pagado').length;
  const cliMap={};
  pedidos.forEach(p=>{
    if(!cliMap[p.cliente])cliMap[p.cliente]={peds:0,bultos:0,monto:0,cobrado:0};
    cliMap[p.cliente].peds++;cliMap[p.cliente].bultos+=totalBultos(p);cliMap[p.cliente].monto+=totalMonto(p);
    if(p.cobro==='pagado')cliMap[p.cliente].cobrado++;
  });
  document.getElementById('tab-resumen').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px">
      <div class="stat"><div class="label">Total pedidos</div><div class="value">${pedidos.length}</div><div class="sub">${pedidos.filter(p=>p.estado==='entregado').length} entregados</div></div>
      <div class="stat"><div class="label">Total vendido</div><div class="value" style="font-size:16px;color:var(--green)">${fmt(totalM)}</div><div class="sub">${totalB} bultos</div></div>
      <div class="stat"><div class="label">Clientes</div><div class="value">${new Set(pedidos.map(p=>p.cliente)).size}</div></div>
      <div class="stat"><div class="label">Cobros</div><div class="value" style="color:var(--green)">${cobrados}</div><div class="sub" style="color:var(--red)">${pendCobro} pendientes</div></div>
    </div>
    <div class="card"><h2>Resumen por cliente</h2>
      <table class="stbl"><thead><tr><th>Cliente</th><th>Pedidos</th><th>Bultos</th><th>Total $</th><th>Cobrado</th></tr></thead>
      <tbody>${Object.entries(cliMap).map(([k,v])=>`<tr><td><strong>${k}</strong></td><td class="num">${v.peds}</td><td class="num">${v.bultos}</td><td class="num big-num">${fmt(v.monto)}</td><td class="num"><span class="badge ${v.cobrado===v.peds?'badge-pagado':'badge-nopagado'}">${v.cobrado}/${v.peds}</span></td></tr>`).join('')}</tbody>
      </table></div>`;
}

function mostrarSolicitud(){
  document.getElementById('solicitud-card').style.display='block';
  document.querySelector('.login-card').style.display='none';
}

function mostrarLogin(){
  document.getElementById('solicitud-card').style.display='none';
  document.querySelector('.login-card').style.display='block';
}

async function enviarSolicitud(){
  const nombre=document.getElementById('s-nombre').value.trim();
  const email=document.getElementById('s-email').value.trim();
  const msg=document.getElementById('solicitud-msg');
  if(!nombre||!email){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Completá todos los campos.';return;}
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/solicitudes`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({nombre,email})
    });
    if(res.ok){
      // Send notification email via Supabase
      await fetch(`${SUPA_URL}/rest/v1/rpc/notificar_solicitud`,{
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({p_nombre:nombre,p_email:email})
      }).catch(()=>{});
      msg.style.display='block';msg.style.color='var(--green)';
      msg.textContent='✓ Solicitud enviada. Te contactaremos pronto.';
      document.getElementById('s-nombre').value='';
      document.getElementById('s-email').value='';
    }else{throw new Error();}
  }catch(e){msg.style.display='block';msg.style.color='var(--red)';msg.textContent='Error al enviar. Intentá de nuevo.';}
}

async function renderAdmin(){
  if(currentProfile.rol!=='admin'){document.getElementById('tab-admin').innerHTML='<div class="empty">Sin acceso.</div>';return;}
  let users=[], solicitudes=[];
  try{users=await supa('/rest/v1/profiles?select=*');}catch(e){}
  try{solicitudes=await supa('/rest/v1/solicitudes?select=*&order=created_at.desc');}catch(e){}
  
  const pendientes=solicitudes.filter(s=>s.estado==='pendiente');
  
  document.getElementById('tab-admin').innerHTML=`
    ${pendientes.length>0?`
    <div class="card" style="border-top:3px solid var(--red)">
      <h2>🔔 Solicitudes pendientes (${pendientes.length})</h2>
      ${pendientes.map(s=>`<div class="admin-user-card">
        <div class="info">
          <div class="nombre">${s.nombre}</div>
          <div class="email">${s.email} · ${s.created_at?.substring(0,10)}</div>
        </div>
        <button class="btn-sm btn-success" onclick="aprobarSolicitud(${s.id},'${s.email}','${s.nombre}')">✓ Aprobar</button>
        <button class="btn-sm btn-danger" onclick="rechazarSolicitud(${s.id})">Rechazar</button>
      </div>`).join('')}
    </div>`:''}
    <div class="card">
      <h2>Usuarios activos</h2>
      <p style="font-size:12px;color:#888;margin-bottom:14px">Podés cambiar el rol de cada usuario acá.</p>
      ${users.map(u=>`<div class="admin-user-card">
        <div class="info"><div class="nombre">${u.nombre||'Sin nombre'}</div></div>
        <span class="rol-badge rol-${u.rol}">${u.rol}</span>
        <select onchange="cambiarRol('${u.id}',this.value)" style="padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px">
          <option value="admin" ${u.rol==='admin'?'selected':''}>Admin</option>
          <option value="comercial" ${u.rol==='comercial'?'selected':''}>Comercial</option>
          <option value="produccion" ${u.rol==='produccion'?'selected':''}>Producción</option>
          <option value="compras" ${u.rol==='compras'?'selected':''}>Compras</option>
        </select>
      </div>`).join('')}
    </div>`;
}

async function aprobarSolicitud(id, email, nombre){
  // Invite user via Supabase
  try{
    await supa('/auth/v1/admin/users','POST',{email,password:Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2).toUpperCase()+'!1',email_confirm:true,user_metadata:{nombre}});
    await supa(`/rest/v1/solicitudes?id=eq.${id}`,'PATCH',{estado:'aprobado'});
    alert(`✓ Usuario ${email} aprobado. Supabase le enviará el email de confirmación.`);
    renderAdmin();
  }catch(e){alert('Error al aprobar. Revisá el panel de Supabase.');}
}

async function rechazarSolicitud(id){
  await supa(`/rest/v1/solicitudes?id=eq.${id}`,'PATCH',{estado:'rechazado'});
  renderAdmin();
}

async function cambiarRol(uid,rol){
  await supa(`/rest/v1/profiles?id=eq.${uid}`,'PATCH',{rol});
}
</script>
